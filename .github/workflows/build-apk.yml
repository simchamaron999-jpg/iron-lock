name: Build MistyMessenger APK

on:
  push:
    branches:
      - "claude/messaging-app-material-design-vGfci"
      - "main"
      - "master"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Make gradlew executable
        working-directory: MessagingApp
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: MessagingApp
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "error:|Error:|FAILED|Exception|Unresolved|> Task" /tmp/build.log | tail -80 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MistyMessenger-debug
          path: MessagingApp/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
